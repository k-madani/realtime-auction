# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auction_db
spring.datasource.username=postgres
spring.datasource.password=1122Postgre$ql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# JWT Configuration (Set via environment variables in production)
jwt.secret=${JWT_SECRET:your-secret-key-here-make-it-long-and-secure-minimum-256-bits}
jwt.expiration=86400000

# Stripe Configuration (Set via environment variables)
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# Stripe Checkout URLs
stripe.success.url=http://localhost:3000/payment/success?session_id={CHECKOUT_SESSION_ID}
stripe.cancel.url=http://localhost:3000/payment/cancel

# Cloudinary Configuration (Set via environment variables)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# File upload settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Platform Configuration
platform.fee.percentage=5.0
platform.shipping.default=15.00

# Anti-Snipe Configuration
auction.anti-snipe.enabled=true
auction.anti-snipe.threshold-minutes=5
auction.anti-snipe.extension-minutes=5

# Logging
logging.level.com.auction.realtime_auction=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG