  # ── Watchlist ──
  /watchlist:
    get:
      tags: [Watchlist]
      summary: Get authenticated user's watchlist
      responses:
        '200':
          description: Watchlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchlistResponse'
              example:
                - id: 33
                  addedAt: "2026-03-01T12:00:00"
                  auction:
                    id: 42
                    title: Vintage Rolex Submariner 1965
                    currentPrice: 5250.00
                    status: ACTIVE
                    totalBids: 8
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "User not found: alice_dev"
                error: Not Found
                timestamp: "2026-03-01T12:00:00"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /watchlist/auction-ids:
    get:
      tags: [Watchlist]
      summary: Get all auction IDs in user's watchlist
      responses:
        '200':
          description: List of auction IDs
          content:
            application/json:
              example: [42, 38, 55]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "User not found: alice_dev"
                error: Not Found
                timestamp: "2026-03-01T12:00:00"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /watchlist/auction/{auctionId}:
    post:
      tags: [Watchlist]
      summary: Add auction to watchlist
      parameters:
        - name: auctionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 42
      responses:
        '201':
          description: Added to watchlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
              example:
                id: 33
                addedAt: "2026-03-01T12:00:00"
                auction:
                  id: 42
                  title: Vintage Rolex Submariner 1965
                  currentPrice: 5250.00
                  status: ACTIVE
        '400':
          description: Already in watchlist or own auction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: Auction is already in your watchlist
                error: Bad Request
                timestamp: "2026-03-01T12:00:00"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Auction or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "Auction not found with id: 42"
                error: Not Found
                timestamp: "2026-03-01T12:00:00"
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Watchlist]
      summary: Remove auction from watchlist
      parameters:
        - name: auctionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 42
      responses:
        '200':
          description: Removed from watchlist
          content:
            application/json:
              example:
                message: Removed from watchlist
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Auction not in watchlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: Auction not found in watchlist
                error: Not Found
                timestamp: "2026-03-01T12:00:00"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /watchlist/check/{auctionId}:
    get:
