  # ── Images ──
  /images/upload:
    post:
      tags: [Images]
      summary: Upload a single image to Cloudinary
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Image uploaded successfully
          content:
            application/json:
              example:
                url: https://res.cloudinary.com/demo/image/upload/v1/auction-platform/auctions/abc-123.jpg
                message: Image uploaded successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /images/upload-multiple:
    post:
      tags: [Images]
      summary: Upload multiple images to Cloudinary
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Images uploaded successfully
          content:
            application/json:
              example:
                urls:
                  - https://res.cloudinary.com/demo/image/upload/v1/auction-platform/auctions/img1.jpg
                  - https://res.cloudinary.com/demo/image/upload/v1/auction-platform/auctions/img2.jpg
                count: 2
                message: Images uploaded successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /images/delete:
    delete:
      tags: [Images]
      summary: Delete a single image from Cloudinary
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            example: https://res.cloudinary.com/demo/image/upload/v1/auction-platform/auctions/abc-123.jpg
      responses:
        '200':
          description: Image deleted successfully
          content:
            application/json:
              example:
                message: Image deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /images/delete-multiple:
    post:
      tags: [Images]
      summary: Delete multiple images from Cloudinary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
            example:
              - https://res.cloudinary.com/demo/image/upload/v1/auction-platform/auctions/img1.jpg
              - https://res.cloudinary.com/demo/image/upload/v1/auction-platform/auctions/img2.jpg
      responses:
        '200':
          description: Images deleted
          content:
            application/json:
              example:
                message: Images deleted successfully
                deletedCount: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'