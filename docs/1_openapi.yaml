                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "Auction not found with id: 42"
                error: Not Found
                timestamp: "2026-03-04T09:20:00"
        '500':
          $ref: '#/components/responses/InternalServerError'

